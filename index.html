<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정직한 게임 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cr:#FFF8F0;--cr2:#FFF0E4;--pk:#FFE8D0;--ap:#FFCBA4;--co:#FF8C6B;--co2:#E8704F;
  --br:#7B3F00;--br2:#B06040;--br3:#C09070;
  --ta:#EF5350;--ta2:#FFEBEE;--ta3:#FFCDD2;
  --tb:#2196F3;--tb2:#E3F2FD;--tb3:#BBDEFB;
  --lo:#EC407A;--lo2:#FCE4EC;
  --be:#F59E0B;--be2:#FFFBEB;
  --dbc:#7C3AED;--dbl:#EDE9FE;
  --swc:#0891B2;--swl:#ECFEFF;
  --gn:#16A34A;--gnl:#F0FDF4;
  --rd:#DC2626;--gy:#9CA3AF;
  --gd:#D97706;--gdl:#FFFBEB;
}
html,body{height:100%;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:linear-gradient(160deg,var(--cr) 0%,var(--cr2) 100%);min-height:100vh;-webkit-tap-highlight-color:transparent;}
#root{min-height:100vh;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.82);}to{opacity:1;transform:scale(1);}}
@keyframes shine{0%{left:-120%;}100%{left:200%;}}
@keyframes confDrop{0%{transform:translateY(-30px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}
@keyframes flashGold{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes popReveal{0%{opacity:0;transform:scale(0.4) rotate(-6deg);}60%{transform:scale(1.08) rotate(1deg);}80%{transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
@keyframes bgFlash{0%{background:#111;}25%{background:#5B21B6;}65%{background:#B45309;}100%{background:linear-gradient(160deg,#FFF8F0,#FFF0E4);}}

.fade-up{animation:fadeUp .5s ease both;}
.float-y{animation:floatY 3.2s ease-in-out infinite;}
.scale-in{animation:scaleIn .45s cubic-bezier(.34,1.56,.64,1) both;}
.pop-reveal{animation:popReveal .65s cubic-bezier(.34,1.56,.64,1) both;}
.bg-flash{animation:bgFlash 1s ease both;}
.flash{animation:flashGold 1.2s ease-in-out infinite;}
.conf-piece{position:fixed;top:-20px;border-radius:3px;animation:confDrop linear both;pointer-events:none;z-index:999;}

/* ── 공통 레이아웃 ── */
.page{min-height:100vh;padding:40px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.btn{cursor:pointer;border:none;outline:none;font-family:inherit;transition:transform .14s ease,box-shadow .14s ease;}
.btn:active:not(:disabled){transform:scale(.95)!important;}
.btn:disabled{cursor:not-allowed;opacity:.4;}
.btn-primary{display:block;width:100%;padding:22px;font-size:22px;font-weight:700;
  background:linear-gradient(135deg,var(--co),var(--co2));color:#fff;border-radius:18px;
  box-shadow:0 8px 28px rgba(232,112,79,.38);position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shine 2.6s ease-in-out infinite;}
.btn-primary:disabled{background:#DDD0C5;box-shadow:none;color:var(--br3);}
.btn-primary:disabled::after{display:none;}
.btn-gold{background:linear-gradient(135deg,#F59E0B,#D97706)!important;box-shadow:0 8px 28px rgba(217,119,6,.42)!important;}

/* ══════════════════════════════════
   SETUP 화면
══════════════════════════════════ */
.setup-wrap{width:100%;max-width:760px;text-align:center;}
.logo{font-size:100px;line-height:1;margin-bottom:18px;}
.main-title{font-size:64px;font-weight:900;color:var(--br);letter-spacing:-2.5px;margin-bottom:10px;}
.setup-sub{font-size:22px;color:var(--br2);line-height:1.8;margin-bottom:36px;}
.setup-sub strong{color:var(--co2);}
.setup-card{background:rgba(255,255,255,.92);border-radius:24px;padding:36px 40px 30px;
  margin-bottom:28px;border:2px solid var(--ap);}
.setup-fields{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.setup-field{text-align:left;}
.setup-label{display:block;font-size:18px;font-weight:700;color:var(--br);margin-bottom:10px;}
.setup-input{width:100%;padding:18px 22px;border-radius:16px;border:2px solid var(--ap);
  font-size:22px;font-family:inherit;color:var(--br);background:#fff;outline:none;
  transition:border-color .2s ease,box-shadow .2s ease;}
.setup-input:focus{border-color:var(--co);box-shadow:0 0 0 4px rgba(255,140,107,.18);}
.footer-note{margin-top:16px;font-size:16px;color:var(--br3);}

/* ══════════════════════════════════
   MAIN 화면
══════════════════════════════════ */
.main-wrap{width:100%;max-width:800px;text-align:center;}
.main-sub{font-size:22px;color:var(--br2);line-height:1.9;margin-bottom:32px;}
.main-sub strong{color:var(--co2);}
.rules-card{background:rgba(255,255,255,.9);border-radius:24px;padding:32px 40px;
  margin-bottom:32px;border:2px solid var(--ap);}
.rules-card h3{font-size:20px;font-weight:700;color:var(--br);margin-bottom:18px;}
.rule-row{display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1.5px solid var(--pk);font-size:20px;color:var(--br2);}
.rule-row.last{border-bottom:none;padding-bottom:0;}
.sc-g{font-weight:900;color:var(--gn);font-size:22px;}
.sc-y{font-weight:900;color:var(--gy);font-size:22px;}
.sc-r{font-weight:900;color:var(--rd);font-size:22px;}
.item-note{margin-top:20px;padding:16px 20px;background:var(--pk);border-radius:14px;
  font-size:17px;color:var(--br2);line-height:1.9;}

/* ══════════════════════════════════
   PLAYING 화면
══════════════════════════════════ */
.playing-page{height:100vh;padding:16px 40px;display:flex;flex-direction:column;overflow:hidden;}
.game-wrap{width:100%;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;flex:1;min-height:0;}
.hidden-banner{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;
  border-radius:12px;padding:8px 20px;text-align:center;font-size:17px;font-weight:700;
  margin-bottom:10px;box-shadow:0 4px 18px rgba(217,119,6,.38);}

/* 점수 헤더 */
.score-header{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;margin-bottom:10px;align-items:stretch;}
.score-box{background:#fff;border-radius:16px;padding:10px 20px;text-align:center;}
.score-box.a{border:2px solid var(--ta3);box-shadow:0 3px 14px rgba(239,83,80,.1);}
.score-box.b{border:2px solid var(--tb3);box-shadow:0 3px 14px rgba(33,150,243,.1);}
.score-lbl{font-size:14px;font-weight:700;color:var(--gy);margin-bottom:2px;}
.score-num{font-size:44px;font-weight:900;line-height:1;}
.score-num.a{color:var(--ta);}.score-num.b{color:var(--tb);}
.round-mid{text-align:center;display:flex;flex-direction:column;justify-content:center;padding:4px 12px;}
.round-lbl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--br3);}
.round-num{font-size:40px;font-weight:900;color:var(--br);line-height:1;}
.round-num.gold{color:var(--gd);}
.round-tot{font-size:13px;color:var(--br3);margin-top:1px;}

/* 진행 바 */
.progress{display:flex;justify-content:center;gap:8px;margin-bottom:10px;}
.prog-dot{height:8px;border-radius:4px;transition:all .3s ease;}
.prog-dot.done{width:8px;background:var(--ap);}
.prog-dot.cur{width:28px;background:var(--co);}
.prog-dot.pend{width:8px;background:var(--pk);}
.prog-dot.hid{width:28px;background:var(--gd);}

/* 게임 본체 2열 레이아웃 */
.game-body{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0;}
.game-left{display:flex;flex-direction:column;gap:8px;min-height:0;}
.game-right{display:flex;flex-direction:column;min-height:0;}

/* 팀 패널 */
.team-panel{border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;flex:1;min-height:0;}
.team-panel.a{background:var(--ta2);border:2px solid var(--ta3);}
.team-panel.b{background:var(--tb2);border:2px solid var(--tb3);}
.team-name{text-align:center;font-size:20px;font-weight:900;margin-bottom:10px;}
.team-panel.a .team-name{color:var(--ta);}.team-panel.b .team-name{color:var(--tb);}
.sec-lbl{font-size:11px;font-weight:700;color:var(--gy);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}

/* 카드 선택 버튼 */
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.card-btn{padding:14px 8px 10px;border-radius:14px;border:3px solid transparent;
  background:#fff;cursor:pointer;transition:all .2s ease;font-family:inherit;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card-btn .c-emoji{font-size:34px;margin-bottom:5px;line-height:1;display:block;}
.card-btn .c-lbl{font-size:13px;font-weight:700;color:var(--gy);display:block;}
.card-btn.love.selected{background:var(--lo2);border-color:var(--lo);
  box-shadow:0 4px 14px rgba(236,64,122,.25);transform:translateY(-3px);}
.card-btn.love.selected .c-lbl{color:var(--lo);}
.card-btn.benefit.selected{background:var(--be2);border-color:var(--be);
  box-shadow:0 4px 14px rgba(245,158,11,.25);transform:translateY(-3px);}
.card-btn.benefit.selected .c-lbl{color:var(--be);}

/* 아이템 버튼 */
.item-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.item-btn{position:relative;padding:8px 10px 7px;border-radius:12px;border:none;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s ease;}
.item-btn .i-icon{font-size:16px;line-height:1;display:block;margin-bottom:2px;}
.item-btn .i-lbl{display:block;}
.item-btn.double{background:var(--dbl);color:var(--dbc);}
.item-btn.switch{background:var(--swl);color:var(--swc);}
.item-btn.double.on{background:var(--dbc);color:#fff;box-shadow:0 3px 12px rgba(124,58,237,.4);}
.item-btn.switch.on{background:var(--swc);color:#fff;box-shadow:0 3px 12px rgba(8,145,178,.4);}
.item-btn .badge{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
  background:#FF5252;color:#fff;font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(255,82,82,.4);}
.item-btn:disabled{opacity:.35;cursor:not-allowed;}

.priority-note{background:rgba(255,255,255,.7);border-radius:10px;padding:7px 14px;
  font-size:12px;color:var(--br3);text-align:center;border:1px solid var(--pk);}

/* 점수 기록 패널 (오른쪽 전체) */
.hist-panel{background:#fff;border-radius:18px;padding:16px 20px;flex:1;
  box-shadow:0 2px 14px rgba(176,96,64,.08);display:flex;flex-direction:column;overflow:auto;}
.hist-panel h4{font-size:16px;font-weight:700;color:var(--br);margin-bottom:12px;}
.hist-panel table{width:100%;border-collapse:collapse;font-size:15px;}
.hist-panel th{padding:8px 4px;text-align:center;font-weight:700;color:var(--gy);border-bottom:2px solid var(--pk);}
.hist-panel th.a{color:var(--ta);}.hist-panel th.b{color:var(--tb);}
.hist-panel td{text-align:center;padding:9px 4px;border-top:1px solid var(--pk);}
.hist-panel tr.hidden-row td{background:var(--gdl);}
.hist-empty{flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--br3);font-size:15px;text-align:center;line-height:2;}

/* ══════════════════════════════════
   RESULT 화면
══════════════════════════════════ */
.result-page{min-height:100vh;padding:40px 80px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--cr),var(--cr2));}
.result-wrap{width:100%;max-width:960px;}
.result-hdr{text-align:center;margin-bottom:28px;}
.result-rlbl{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--br3);margin-bottom:6px;}
.result-title{font-size:42px;font-weight:900;color:var(--br);}
.reveal-row{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin-bottom:20px;}
.reveal-card{background:#fff;border-radius:24px;padding:32px 24px;text-align:center;}
.reveal-card.a{border:3px solid var(--ta3);box-shadow:0 6px 24px rgba(239,83,80,.12);}
.reveal-card.b{border:3px solid var(--tb3);box-shadow:0 6px 24px rgba(33,150,243,.12);}
.rev-team{font-size:18px;font-weight:700;margin-bottom:12px;}
.reveal-card.a .rev-team{color:var(--ta);}.reveal-card.b .rev-team{color:var(--tb);}
.rev-cross{font-size:16px;color:var(--gy);text-decoration:line-through;margin-bottom:4px;}
.rev-emoji{font-size:72px;margin-bottom:10px;line-height:1;display:block;}
.rev-name{font-size:20px;font-weight:700;color:var(--br);margin-bottom:14px;}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;}
.tag{font-size:13px;font-weight:700;color:#fff;border-radius:8px;padding:4px 10px;}
.tag.dbl{background:var(--dbc);}.tag.sw{background:var(--swc);}
.rev-score{font-size:48px;font-weight:900;}
.vs-sep{font-size:20px;color:var(--br3);font-weight:700;text-align:center;}
.outcome-box{border-radius:16px;padding:16px 24px;text-align:center;margin-bottom:16px;}
.outcome-box p{font-size:20px;font-weight:700;}
.priority-explain{background:#fff;border-radius:14px;padding:12px 20px;margin-bottom:20px;
  font-size:15px;color:var(--br3);text-align:center;border:1px solid var(--pk);line-height:1.7;}
.totals-box{background:#fff;border-radius:20px;padding:24px 48px;
  display:flex;justify-content:space-around;align-items:center;
  box-shadow:0 3px 16px rgba(176,96,64,.08);margin-bottom:24px;}
.tot-blk{text-align:center;}
.tot-lbl{font-size:16px;font-weight:600;color:var(--gy);margin-bottom:6px;}
.tot-num{font-size:56px;font-weight:900;line-height:1;}
.tot-num.a{color:var(--ta);}.tot-num.b{color:var(--tb);}
.tot-sep{width:2px;height:60px;background:var(--pk);}

/* ══════════════════════════════════
   HIDDEN 화면
══════════════════════════════════ */
.hidden-page{min-height:100vh;padding:40px;display:flex;align-items:center;justify-content:center;}
.hidden-wrap{width:100%;max-width:700px;text-align:center;}
.hid-scores{display:flex;justify-content:space-around;align-items:center;padding:8px 0;}
.hid-team{text-align:center;}
.hid-team-lbl{font-size:18px;font-weight:700;margin-bottom:8px;}
.hid-team-lbl.a{color:var(--ta);}.hid-team-lbl.b{color:var(--tb);}
.hid-big{font-size:64px;font-weight:900;line-height:1;}
.hid-big.a{color:var(--ta);}.hid-big.b{color:var(--tb);}
.hid-colon{font-size:32px;color:var(--ap);font-weight:700;}

/* ══════════════════════════════════
   FINAL 화면
══════════════════════════════════ */
.final-page{height:100vh;padding:20px 80px;display:flex;align-items:flex-start;justify-content:center;
  background:linear-gradient(160deg,var(--cr),var(--cr2));overflow:hidden;}
.final-wrap{width:100%;max-width:1000px;display:flex;flex-direction:column;height:100%;gap:14px;}
.winner-card{background:#fff;border-radius:24px;padding:20px 40px;text-align:center;
  box-shadow:0 8px 36px rgba(176,96,64,.12);border:2px solid var(--ap);}
.trophy{font-size:52px;margin-bottom:8px;line-height:1;}
.winner-txt{font-size:36px;font-weight:900;margin-bottom:4px;}
.winner-sub{font-size:16px;color:var(--br3);}
.score-compare{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:16px;}
.sc-team{text-align:center;}
.sc-team-lbl{font-size:15px;font-weight:700;margin-bottom:4px;}
.sc-team-lbl.a{color:var(--ta);}.sc-team-lbl.b{color:var(--tb);}
.sc-big{font-size:56px;font-weight:900;line-height:1;}
.sc-big.a{color:var(--ta);}.sc-big.b{color:var(--tb);}
.sc-love{font-size:13px;color:var(--gy);margin-top:4px;}
.sc-colon{font-size:28px;color:var(--ap);font-weight:700;}
.hist-card{background:#fff;border-radius:18px;padding:16px 24px;
  box-shadow:0 3px 16px rgba(176,96,64,.08);flex:1;overflow:auto;}
.hist-card h4{font-size:16px;font-weight:700;color:var(--br);margin-bottom:10px;}
.hist-card table{width:100%;border-collapse:collapse;font-size:15px;}
.hist-card th{padding:8px 6px;text-align:center;font-size:13px;font-weight:700;color:var(--gy);
  background:var(--cr);border-bottom:2px solid var(--pk);}
.hist-card th.a{color:var(--ta);}.hist-card th.b{color:var(--tb);}
.hist-card td{text-align:center;padding:8px 6px;border-top:1px solid var(--pk);}
.hist-total{border-top:3px solid var(--ap)!important;background:var(--cr);}
.hist-hidden{background:var(--gdl)!important;}
.reflect{background:linear-gradient(135deg,var(--lo2),var(--pk));border-radius:16px;
  padding:14px 24px;text-align:center;border:2px solid var(--ap);}
.reflect p{font-size:16px;color:var(--br);line-height:1.7;}

.gn{color:var(--gn);font-weight:700;}.rd{color:var(--rd);font-weight:700;}.gy-w{color:var(--gy);font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const TR=5, MAX=6;
const SM={
  'love,love':[3,3],'love,benefit':[0,5],
  'benefit,love':[5,0],'benefit,benefit':[-2,-2],
};
function mkSel(){return{aCard:null,bCard:null,aDouble:false,bDouble:false,aSwitch:false,bSwitch:false};}
function mkItems(){return{A:{double:2,switch:1},B:{double:2,switch:1}};}

let S={screen:'setup',teamA:'',teamB:'',round:1,scores:{A:0,B:0},history:[],items:mkItems(),sel:mkSel(),result:null};
function newGame(){S.screen='playing';S.round=1;S.scores={A:0,B:0};S.history=[];S.items=mkItems();S.sel=mkSel();S.result=null;}

const tLb=t=>t==='A'?`🔴 ${S.teamA}`:`🔵 ${S.teamB}`;
const scoreClass=n=>n>0?'gn':n<0?'rd':'gy-w';
const scoreSign=n=>(n>0?'+':'')+n;
const cardEmoji=c=>c==='love'?'❤️':'💰';
const cardName=c=>c==='love'?'사랑 카드':'편익 카드';
const isHidRound=()=>S.round>TR;

window.setTeams=()=>{
  S.teamA=(document.getElementById('inp-a').value||'').trim()||'A팀';
  S.teamB=(document.getElementById('inp-b').value||'').trim()||'B팀';
  S.screen='main';render();
};
window.startGame=()=>{newGame();render();};
window.restartGame=()=>{S.screen='setup';render();};
window.selectCard=(team,card)=>{
  const k=team==='A'?'aCard':'bCard';
  S.sel[k]=S.sel[k]===card?null:card;render();
};
window.toggleItem=(team,type)=>{
  const k=team==='A'?(type==='double'?'aDouble':'aSwitch'):(type==='double'?'bDouble':'bSwitch');
  if(!S.sel[k]&&S.items[team][type]===0)return;
  S.sel[k]=!S.sel[k];render();
};
window.confirmRound=()=>{
  const{aCard,bCard,aDouble,bDouble,aSwitch,bSwitch}=S.sel;
  const[ab,bb]=SM[aCard+','+bCard];
  let aScore=aDouble?ab*2:ab, bScore=bDouble?bb*2:bb;
  let scoreSwapped=false;
  if((aSwitch||bSwitch)&&!(aSwitch&&bSwitch)){[aScore,bScore]=[bScore,aScore];scoreSwapped=true;}
  S.scores.A+=aScore;S.scores.B+=bScore;
  S.result={round:S.round,isHidden:S.round>TR,aCard,bCard,aDouble,bDouble,aSwitch,bSwitch,
    aBaseScore:aDouble?ab*2:ab,bBaseScore:bDouble?bb*2:bb,scoreSwapped,aScore,bScore};
  S.history.push({...S.result,totalA:S.scores.A,totalB:S.scores.B});
  S.items.A.double-=aDouble?1:0;S.items.A.switch-=aSwitch?1:0;
  S.items.B.double-=bDouble?1:0;S.items.B.switch-=bSwitch?1:0;
  S.screen='roundResult';render();
};
window.nextRound=()=>{
  if(S.round>=MAX){S.screen='final';}
  else if(S.round===TR){S.screen='hidden';}
  else{S.round++;S.sel=mkSel();S.screen='playing';}
  render();
};
window.startHiddenRound=()=>{S.round=TR+1;S.items=mkItems();S.sel=mkSel();S.screen='playing';render();};

function dots(){
  if(isHidRound())return Array.from({length:TR},()=>'<div class="prog-dot done"></div>').join('')+'<div class="prog-dot hid flash"></div>';
  return Array.from({length:TR},(_,i)=>{
    const cls=i+1<S.round?'done':i+1===S.round?'cur':'pend';
    return`<div class="prog-dot ${cls}"></div>`;
  }).join('');
}

function teamPanel(team){
  const tk=team==='A'?'a':'b';
  const card=S.sel[tk+'Card'],dbl=S.sel[tk+'Double'],sw=S.sel[tk+'Switch'],it=S.items[team];
  const lcls='card-btn love btn'+(card==='love'?' selected':'');
  const bcls='card-btn benefit btn'+(card==='benefit'?' selected':'');
  const dcls='item-btn double btn'+(dbl?' on':'');
  const scls='item-btn switch btn'+(sw?' on':'');
  const ddis=!dbl&&it.double===0?'disabled':'';
  const sdis=!sw&&it.switch===0?'disabled':'';
  return`
  <div class="team-panel ${team.toLowerCase()}">
    <div class="team-name">${tLb(team)}</div>
    <div class="sec-lbl">카드 선택</div>
    <div class="card-row">
      <button class="${lcls}" onclick="selectCard('${team}','love')">
        <span class="c-emoji">❤️</span><span class="c-lbl">사랑 카드</span>
      </button>
      <button class="${bcls}" onclick="selectCard('${team}','benefit')">
        <span class="c-emoji">💰</span><span class="c-lbl">편익 카드</span>
      </button>
    </div>
    <div class="sec-lbl">아이템 카드</div>
    <div class="item-row">
      <button class="${dcls}" onclick="toggleItem('${team}','double')" ${ddis}>
        <span class="i-icon">✕2</span><span class="i-lbl">×2 카드</span>
        ${it.double>0?`<span class="badge">${it.double}</span>`:''}
      </button>
      <button class="${scls}" onclick="toggleItem('${team}','switch')" ${sdis}>
        <span class="i-icon">🔀</span><span class="i-lbl">스위치</span>
        ${it.switch>0?`<span class="badge">${it.switch}</span>`:''}
      </button>
    </div>
  </div>`;
}

function histPanel(){
  const rows=S.history.map(h=>`
    <tr class="${h.isHidden?'hidden-row':''}">
      <td style="font-weight:700;color:${h.isHidden?'var(--gd)':'var(--br2)'}">${h.isHidden?'⚡':h.round}</td>
      <td>${cardEmoji(h.aCard)}${h.aDouble?'<sup style="font-size:12px;color:var(--dbc)"> ×2</sup>':''}${h.aSwitch?'<sup style="font-size:12px;color:var(--swc)"> 🔀</sup>':''}</td>
      <td>${cardEmoji(h.bCard)}${h.bDouble?'<sup style="font-size:12px;color:var(--dbc)"> ×2</sup>':''}${h.bSwitch?'<sup style="font-size:12px;color:var(--swc)"> 🔀</sup>':''}</td>
      <td class="${scoreClass(h.aScore)}">${scoreSign(h.aScore)}</td>
      <td class="${scoreClass(h.bScore)}">${scoreSign(h.bScore)}</td>
    </tr>`).join('');
  const empty=`<div class="hist-empty">아직 완료된 라운드가 없어요.<br>카드를 선택하고 라운드를 확정해보세요! 🎴</div>`;
  return`
  <div class="hist-panel">
    <h4>📊 점수 기록</h4>
    ${S.history.length?`<table><thead><tr>
      <th>R</th><th class="a">${S.teamA}</th><th class="b">${S.teamB}</th>
      <th class="a">A점</th><th class="b">B점</th>
    </tr></thead><tbody>${rows}</tbody></table>`:empty}
  </div>`;
}

/* ── 화면 HTML ── */

  return`
  <div class="page">
  <div class="setup-wrap fade-up">
    <div class="logo float-y">🕊️</div>
    <h1 class="main-title">정직한 게임</h1>
    <p class="setup-sub">죄수의 딜레마를 넘어 <strong>사랑의 힘</strong>으로 함께 이기는 게임</p>
    <div class="setup-card">
      <div class="setup-fields">
        <div class="setup-field">
          <label class="setup-label">🔴 1팀 이름</label>
          <input class="setup-input" id="inp-a" type="text" placeholder="A팀" maxlength="12" value="${S.teamA}" autocomplete="off">
        </div>
        <div class="setup-field">
          <label class="setup-label">🔵 2팀 이름</label>

        </div>

    <button class="btn-primary" onclick="setTeams()">다음 →</button>
    <p class="footer-note" style="margin-top:16px;">A팀 vs B팀</p>

}

function htmlMain(){
  return`
  <div class="page">
  <div class="main-wrap fade-up">
    <div class="logo float-y">🕊️</div>
    <h1 class="main-title">정직한 게임</h1>
    <p class="main-sub">죄수의 딜레마를 넘어 <strong>사랑의 힘</strong>으로 함께 이기는 게임</p>
    <div class="rules-card">
      <h3>📋 라운드 점수 규칙</h3>
      <div class="rule-row"><span>❤️ 사랑 · ❤️ 사랑</span><span class="sc-g">+3 / +3</span></div>
      <div class="rule-row"><span>❤️ 사랑 · 💰 편익</span><span class="sc-y">0 / +5</span></div>
      <div class="rule-row"><span>💰 편익 · ❤️ 사랑</span><span class="sc-y">+5 / 0</span></div>
      <div class="rule-row last"><span>💰 편익 · 💰 편익</span><span class="sc-r">-2 / -2</span></div>
      <div class="item-note">✕2 카드 (팀당 2장, 점수 2배) · 🔀 스위치 (팀당 1장, 점수 교환)<br>
        <strong>우선순위:</strong> ×2 먼저 계산 → 스위치로 점수 교환</div>
    </div>
    <button class="btn-primary" onclick="startGame()">🎮 게임 시작하기</button>
    <p class="footer-note" style="margin-top:14px;">
      <span style="cursor:pointer;text-decoration:underline;" onclick="restartGame()">← 팀 이름 변경</span>
    </p>
  </div>
  </div>`;
}

function htmlPlaying(){
  const hidden=isHidRound();
  const canConfirm=!!(S.sel.aCard&&S.sel.bCard);
  const roundTot=hidden?'<span style="color:var(--gd)">히든</span>':`/ ${TR}`;
  return`
  <div class="playing-page">
  <div class="game-wrap">
    ${hidden?'<div class="hidden-banner">⚡ 히든 라운드 — 아이템이 모두 초기화되었습니다!</div>':''}
    <div class="score-header">
      <div class="score-box a">
        <div class="score-lbl">🔴 ${S.teamA}</div>
        <div class="score-num a">${S.scores.A}</div>
      </div>
      <div class="round-mid">
        <div class="round-lbl">ROUND</div>
        <div class="round-num ${hidden?'gold':''}">${hidden?'⚡':S.round}</div>
        <div class="round-tot">${roundTot}</div>
      </div>
      <div class="score-box b">
        <div class="score-lbl">🔵 ${S.teamB}</div>
        <div class="score-num b">${S.scores.B}</div>
      </div>
    </div>
    <div class="progress">${dots()}</div>
    <div class="game-body">
      <div class="game-left">
        ${teamPanel('A')}
        ${teamPanel('B')}
        <div class="priority-note">📌 ✕2 점수 계산 먼저 → 🔀 스위치로 점수 교환</div>
        <button class="btn-primary ${hidden?'btn-gold':''}" onclick="confirmRound()" ${canConfirm?'':'disabled'}>
          ${canConfirm?'✅ 라운드 확정하기':'양팀 모두 카드를 선택해주세요'}
        </button>
      </div>
      <div class="game-right">
        ${histPanel()}
      </div>
    </div>
  </div>
  </div>`;
}

function htmlResult(){
  const r=S.result;
  const isLast=r.round>=MAX, isNormalLast=r.round===TR;
  const outcome=(()=>{
    if(r.aCard==='love'&&r.bCard==='love')return{txt:'🌟 두 팀 모두 사랑을 선택했어요!',bg:'var(--gnl)',c:'var(--gn)'};
    if(r.aCard==='benefit'&&r.bCard==='benefit')return{txt:'😢 두 팀 모두 편익을 선택했어요...',bg:'#FFF5F5',c:'var(--rd)'};
    if(r.aCard==='love')return{txt:`🌊 ${S.teamB}이(가) 편익을 선택했어요`,bg:'var(--dbl)',c:'var(--dbc)'};
    return{txt:`🌊 ${S.teamA}이(가) 편익을 선택했어요`,bg:'var(--dbl)',c:'var(--dbc)'};
  })();
  const revCard=(side,card,dbl,sw,baseScore,finalScore,swapped)=>{
    const label=side==='a'?tLb('A'):tLb('B');
    const tags=[dbl?'<span class="tag dbl">✕2 사용</span>':'',sw?'<span class="tag sw">🔀 스위치</span>':''].join('');
    return`
    <div class="reveal-card ${side} scale-in">
      <div class="rev-team">${label}</div>
      <span class="rev-emoji">${cardEmoji(card)}</span>
      <div class="rev-name">${cardName(card)}</div>
      <div class="tag-row">${tags}</div>
      ${swapped?`<div class="rev-cross">${scoreSign(baseScore)}점 → 교환</div>`:''}
      <div class="rev-score ${scoreClass(finalScore)}">${scoreSign(finalScore)}점</div>
    </div>`;
  };
  const priorityExplain=(r.aDouble||r.bDouble)&&r.scoreSwapped
    ?`<div class="priority-explain">✕2 적용 후 점수 교환 — ${r.aDouble?`${S.teamA} ×2`:''}${r.aDouble&&r.bDouble?' · ':''}${r.bDouble?`${S.teamB} ×2`:''}, 이후 🔀 점수 교환</div>`:'';
  const btnTxt=isLast?'🏆 최종 결과 보기':isNormalLast?'🏁 게임 종료':`➡️ ${r.round+1}라운드 시작`;
  return`
  <div class="result-page">
  <div class="result-wrap">
    <div class="result-hdr fade-up">
      <div class="result-rlbl">${r.isHidden?'⚡ 히든 ':('ROUND '+r.round+' ')}결과</div>
      <div class="result-title">카드 공개!</div>
    </div>
    <div class="reveal-row">
      ${revCard('a',r.aCard,r.aDouble,r.aSwitch,r.aBaseScore,r.aScore,r.scoreSwapped)}
      <div class="vs-sep">VS</div>
      ${revCard('b',r.bCard,r.bDouble,r.bSwitch,r.bBaseScore,r.bScore,r.scoreSwapped)}
    </div>
    <div class="outcome-box fade-up" style="background:${outcome.bg}">
      <p style="color:${outcome.c}">${outcome.txt}</p>
    </div>
    ${priorityExplain}
    <div class="totals-box fade-up">
      <div class="tot-blk"><div class="tot-lbl">🔴 ${S.teamA} 누계</div><div class="tot-num a">${S.scores.A}</div></div>
      <div class="tot-sep"></div>
      <div class="tot-blk"><div class="tot-lbl">🔵 ${S.teamB} 누계</div><div class="tot-num b">${S.scores.B}</div></div>
    </div>
    <button class="btn-primary ${isNormalLast?'btn-gold':''}" onclick="nextRound()">${btnTxt}</button>
  </div>
  </div>`;
}

function htmlHidden(){
  return`
  <div class="hidden-page bg-flash">
  <div class="hidden-wrap">
    <div class="pop-reveal" style="margin-bottom:32px;">
      <div style="font-size:100px;line-height:1;margin-bottom:20px;filter:drop-shadow(0 0 32px #F59E0B);">⚡</div>
      <div style="font-size:52px;font-weight:900;color:#fff;letter-spacing:-2px;
        text-shadow:0 2px 24px rgba(0,0,0,.5);margin-bottom:12px;">히든 라운드 공개!</div>
      <div style="font-size:20px;color:rgba(255,255,255,.88);font-weight:500;line-height:1.9;">
        마지막 라운드가 열렸습니다!<br>아이템이 <strong style="color:#FDE68A">모두 초기화</strong>됩니다.
      </div>
    </div>
    <div class="pop-reveal" style="animation-delay:.15s;background:rgba(255,255,255,.96);
      border-radius:24px;padding:28px 40px;margin-bottom:20px;
      border:3px solid #FCD34D;box-shadow:0 10px 40px rgba(217,119,6,.3);">
      <div style="font-size:16px;font-weight:700;color:var(--br);margin-bottom:18px;text-align:center;">📊 현재 점수</div>
      <div class="hid-scores">
        <div class="hid-team"><div class="hid-team-lbl a">🔴 ${S.teamA}</div><div class="hid-big a">${S.scores.A}</div></div>
        <div class="hid-colon">:</div>
        <div class="hid-team"><div class="hid-team-lbl b">🔵 ${S.teamB}</div><div class="hid-big b">${S.scores.B}</div></div>
      </div>
    </div>
    <div class="pop-reveal" style="animation-delay:.28s;background:rgba(255,251,235,.96);
      border-radius:18px;padding:20px 32px;margin-bottom:28px;border:2px solid #FCD34D;">
      <p style="font-size:18px;font-weight:700;color:var(--gd);margin-bottom:10px;">🎁 아이템 초기화</p>
      <ul style="font-size:17px;color:var(--br2);line-height:2.2;list-style:none;padding:0;">
        <li>✕2 카드 — 팀당 2장 지급</li>
        <li>🔀 스위치 카드 — 팀당 1장 지급</li>
      </ul>
    </div>
    <div class="pop-reveal" style="animation-delay:.4s;">
      <button class="btn-primary btn-gold" onclick="startHiddenRound()" style="font-size:24px;padding:24px;">
        ⚡ 히든 라운드 시작!
      </button>
    </div>
  </div>
  </div>`;
}

function htmlFinal(){
  const{A,B}=S.scores;
  const diff=A-B,tie=diff===0,aWin=diff>0;
  const winColor=tie?'var(--br2)':aWin?'var(--ta)':'var(--tb)';
  const aLove=S.history.filter(h=>h.aCard==='love').length;
  const bLove=S.history.filter(h=>h.bCard==='love').length;
  const totalLove=aLove+bLove;
  const reflect=totalLove>=9
    ?'두 팀이 서로 사랑을 많이 선택했어요! 신뢰가 쌓이면 모두가 함께 이길 수 있어요. 💛'
    :totalLove>=5
    ?'사랑과 편익 사이에서 고민했군요. 신뢰가 쌓일수록 사랑의 힘이 빛납니다! 🌱'
    :'이번엔 편익을 많이 선택했네요. 다음번엔 사랑으로 함께 이겨봐요! 😊';
  const histRows=S.history.map(h=>`
    <tr class="${h.isHidden?'hist-hidden':''}">
      <td style="font-weight:700;color:${h.isHidden?'var(--gd)':'var(--br2)'}">${h.isHidden?'⚡':h.round}</td>
      <td>${cardEmoji(h.aCard)}${h.aDouble?'<sup style="font-size:12px;color:var(--dbc)"> ×2</sup>':''}${h.aSwitch?'<sup style="font-size:12px"> 🔀</sup>':''}</td>
      <td>${cardEmoji(h.bCard)}${h.bDouble?'<sup style="font-size:12px;color:var(--dbc)"> ×2</sup>':''}${h.bSwitch?'<sup style="font-size:12px"> 🔀</sup>':''}</td>
      <td class="${scoreClass(h.aScore)}">${scoreSign(h.aScore)}</td>
      <td class="${scoreClass(h.bScore)}">${scoreSign(h.bScore)}</td>
    </tr>`).join('');
  const winnerTxt=tie?'무승부!':aWin?`${S.teamA} 우승!`:`${S.teamB} 우승!`;
  const winnerSub=tie?'양팀 동점이에요!':`${Math.abs(diff)}점 차로 ${aWin?S.teamA:S.teamB}이(가) 승리했어요!`;
  return`
  <div class="final-page">
  <div class="final-wrap fade-up">
    <div class="winner-card">
      <div class="trophy float-y">${tie?'🤝':'🏆'}</div>
      <div class="winner-txt" style="color:${winColor}">${winnerTxt}</div>
      <div class="winner-sub">${winnerSub}</div>
      <div class="score-compare">
        <div class="sc-team">
          <div class="sc-team-lbl a">🔴 ${S.teamA}</div>
          <div class="sc-big a">${A}</div>
          <div class="sc-love">❤️ ${aLove}번</div>
        </div>
        <div class="sc-colon">:</div>
        <div class="sc-team">
          <div class="sc-team-lbl b">🔵 ${S.teamB}</div>
          <div class="sc-big b">${B}</div>
          <div class="sc-love">❤️ ${bLove}번</div>
        </div>
      </div>
    </div>
    <div class="hist-card">
      <h4>📊 전체 라운드 기록</h4>
      <table>
        <thead><tr>
          <th>라운드</th><th>${S.teamA}</th><th>${S.teamB}</th>
          <th class="a">A점수</th><th class="b">B점수</th>
        </tr></thead>
        <tbody>
          ${histRows}
          <tr>
            <td class="hist-total" style="font-weight:900;color:var(--br);font-size:15px">합계</td>
            <td class="hist-total"></td><td class="hist-total"></td>
            <td class="hist-total" style="font-weight:900;color:var(--ta);font-size:17px">${A}</td>
            <td class="hist-total" style="font-weight:900;color:var(--tb);font-size:17px">${B}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="reflect"><p>${reflect}</p></div>
    <button class="btn-primary" onclick="restartGame()" style="padding:14px;font-size:18px">🔄 다시 시작하기</button>
  </div>
  </div>`;
}

function spawnConfetti(){
  const colors=['#FF8C6B','#FFB38A','#FFD580','#F48FB1','#90CAF9','#A5D6A7','#CE93D8'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='conf-piece';
    const dur=2.2+Math.random()*1.5;
    el.style.cssText=`left:${Math.random()*100}%;width:${8+Math.random()*10}px;height:${12+Math.random()*8}px;background:${colors[i%colors.length]};animation-duration:${dur}s;animation-delay:${Math.random()*1.4}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove&&el.remove(),(dur+1.5)*1000);
  }
}

function render(){
  const map={setup:htmlSetup,main:htmlMain,playing:htmlPlaying,roundResult:htmlResult,hidden:htmlHidden,final:htmlFinal};
  document.getElementById('root').innerHTML=map[S.screen]();
  if(S.screen==='final')setTimeout(spawnConfetti,100);
}
render();
</script>
</body>
</html>
