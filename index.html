<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>정직한 게임 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cr:#FFF8F0;--cr2:#FFF0E4;--pk:#FFE8D0;--ap:#FFCBA4;--co:#FF8C6B;--co2:#E8704F;
  --br:#7B3F00;--br2:#B06040;--br3:#C09070;
  --ta:#EF5350;--ta2:#FFEBEE;--ta3:#FFCDD2;
  --tb:#2196F3;--tb2:#E3F2FD;--tb3:#BBDEFB;
  --lo:#EC407A;--lo2:#FCE4EC;
  --be:#F59E0B;--be2:#FFFBEB;--be3:#FDE68A;
  --dbc:#7C3AED;--dbl:#EDE9FE;
  --swc:#0891B2;--swl:#ECFEFF;
  --gn:#16A34A;--gnl:#F0FDF4;
  --rd:#DC2626;--gy:#9CA3AF;
  --gd:#D97706;--gdl:#FFFBEB;
}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--cr);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
#root{min-height:100vh;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.82);}to{opacity:1;transform:scale(1);}}
@keyframes shine{0%{left:-120%;}100%{left:200%;}}
@keyframes confDrop{0%{transform:translateY(-30px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}
@keyframes flashGold{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes popReveal{0%{opacity:0;transform:scale(0.4) rotate(-6deg);}60%{transform:scale(1.08) rotate(1deg);}80%{transform:scale(0.96);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
@keyframes bgFlash{0%{background:#000;}20%{background:#7C3AED;}60%{background:#D97706;}100%{background:linear-gradient(160deg,#FFF8F0,#FFF0E4);}}

.fade-up{animation:fadeUp .5s ease both;}
.float-y{animation:floatY 3.2s ease-in-out infinite;}
.scale-in{animation:scaleIn .45s cubic-bezier(.34,1.56,.64,1) both;}
.pop-reveal{animation:popReveal .65s cubic-bezier(.34,1.56,.64,1) both;}
.bg-flash{animation:bgFlash .9s ease both;}
.flash{animation:flashGold 1.2s ease-in-out infinite;}

.conf-piece{position:fixed;top:-20px;border-radius:3px;animation:confDrop linear both;pointer-events:none;z-index:999;}

.page{min-height:100vh;padding:20px;background:linear-gradient(160deg,var(--cr) 0%,var(--cr2) 100%);}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.btn{cursor:pointer;border:none;outline:none;font-family:inherit;transition:transform .14s ease,box-shadow .14s ease;-webkit-tap-highlight-color:transparent;}
.btn:active:not(:disabled){transform:scale(.93)!important;}
.btn:disabled{cursor:not-allowed;opacity:.45;}
.btn-primary{display:block;width:100%;padding:17px;font-size:17px;font-weight:700;
  background:linear-gradient(135deg,var(--co) 0%,var(--co2) 100%);
  color:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(232,112,79,.36);position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shine 2.6s ease-in-out infinite;}
.btn-primary:disabled{background:#DDD0C5;box-shadow:none;color:var(--br3);}
.btn-primary:disabled::after{display:none;}
.btn-gold{background:linear-gradient(135deg,#F59E0B,#D97706);box-shadow:0 8px 22px rgba(217,119,6,.4);}

/* MAIN */
.main-wrap{text-align:center;width:100%;max-width:420px;}
.logo{font-size:68px;margin-bottom:14px;line-height:1;}
.main-title{font-size:38px;font-weight:900;color:var(--br);letter-spacing:-1.5px;margin-bottom:6px;}
.main-sub{font-size:14px;color:var(--br2);line-height:1.9;margin-bottom:26px;}
.main-sub strong{color:var(--co2);}
.rules-card{background:rgba(255,255,255,.88);border-radius:18px;padding:20px 22px;margin-bottom:24px;border:1.5px solid var(--ap);}
.rules-card h3{font-size:13px;font-weight:700;color:var(--br);margin-bottom:13px;}
.rule-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--pk);font-size:13px;color:var(--br2);}
.rule-row.last{border-bottom:none;}
.sc-g{font-weight:700;color:var(--gn);}.sc-y{font-weight:700;color:var(--gy);}.sc-r{font-weight:700;color:var(--rd);}
.item-note{margin-top:13px;padding:10px 13px;background:var(--pk);border-radius:10px;font-size:12px;color:var(--br2);line-height:1.7;}
.hidden-note{margin-top:8px;padding:8px 13px;background:var(--gdl);border-radius:10px;font-size:12px;color:var(--gd);font-weight:700;border:1px solid #FCD34D;}
.footer-note{margin-top:13px;font-size:12px;color:var(--br3);}

/* GAME */
.game-wrap{max-width:520px;margin:0 auto;}
.hidden-banner{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;
  border-radius:12px;padding:10px 16px;text-align:center;font-size:14px;font-weight:700;
  margin-bottom:12px;box-shadow:0 4px 14px rgba(217,119,6,.35);}
.score-header{display:flex;align-items:stretch;gap:10px;margin-bottom:14px;}
.score-box{flex:1;background:#fff;border-radius:14px;padding:10px 14px;text-align:center;}
.score-box.a{border:1.5px solid var(--ta3);box-shadow:0 2px 8px rgba(239,83,80,.1);}
.score-box.b{border:1.5px solid var(--tb3);box-shadow:0 2px 8px rgba(33,150,243,.1);}
.score-lbl{font-size:10px;font-weight:600;color:var(--gy);margin-bottom:2px;}
.score-num{font-size:27px;font-weight:900;line-height:1;}
.score-num.a{color:var(--ta);}.score-num.b{color:var(--tb);}
.round-mid{text-align:center;display:flex;flex-direction:column;justify-content:center;padding:4px 6px;}
.round-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--br3);}
.round-num{font-size:30px;font-weight:900;color:var(--br);line-height:1;}
.round-num.gold{color:var(--gd);}
.round-tot{font-size:11px;color:var(--br3);}
.progress{display:flex;justify-content:center;gap:7px;margin-bottom:18px;}
.prog-dot{height:8px;border-radius:4px;transition:all .3s ease;}
.prog-dot.done{width:8px;background:var(--ap);}
.prog-dot.cur{width:28px;background:var(--co);}
.prog-dot.pend{width:8px;background:var(--pk);}
.prog-dot.hid{width:28px;background:var(--gd);}
.teams-row{display:flex;gap:10px;margin-bottom:14px;}

/* team panel */
.team-panel{flex:1;border-radius:16px;padding:14px 12px;}
.team-panel.a{background:var(--ta2);border:1.5px solid var(--ta3);}
.team-panel.b{background:var(--tb2);border:1.5px solid var(--tb3);}
.team-name{text-align:center;font-size:17px;font-weight:900;margin-bottom:12px;}
.team-panel.a .team-name{color:var(--ta);}.team-panel.b .team-name{color:var(--tb);}
.sec-lbl{font-size:10px;font-weight:600;color:var(--gy);margin-bottom:7px;letter-spacing:.3px;}
.card-row{display:flex;gap:7px;margin-bottom:12px;}
.card-btn{flex:1;padding:13px 5px 11px;border-radius:14px;border:2px solid transparent;
  background:#fff;cursor:pointer;transition:all .2s ease;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.card-btn .c-emoji{font-size:24px;margin-bottom:3px;line-height:1;}
.card-btn .c-lbl{font-size:10px;font-weight:700;color:var(--gy);font-family:inherit;}
.card-btn.love.selected{background:var(--lo2);border-color:var(--lo);box-shadow:0 4px 12px rgba(236,64,122,.22);transform:translateY(-2px);}
.card-btn.love.selected .c-lbl{color:var(--lo);}
.card-btn.benefit.selected{background:var(--be2);border-color:var(--be);box-shadow:0 4px 12px rgba(245,158,11,.22);transform:translateY(-2px);}
.card-btn.benefit.selected .c-lbl{color:var(--be);}
.item-row{display:flex;gap:7px;}
.item-btn{position:relative;padding:7px 10px 6px;border-radius:10px;border:none;
  font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;min-width:58px;transition:all .18s ease;}
.item-btn .i-icon{font-size:14px;line-height:1;}
.item-btn .i-lbl{margin-top:2px;}
.item-btn.double{background:var(--dbl);color:var(--dbc);}
.item-btn.switch{background:var(--swl);color:var(--swc);}
.item-btn.double.on{background:var(--dbc);color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.35);}
.item-btn.switch.on{background:var(--swc);color:#fff;box-shadow:0 3px 10px rgba(8,145,178,.35);}
.item-btn .badge{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
  background:#FF5252;color:#fff;font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(255,82,82,.4);}

/* priority note */
.priority-note{background:#fff;border-radius:10px;padding:8px 12px;margin-top:10px;
  font-size:10px;color:var(--br3);text-align:center;border:1px solid var(--pk);}

/* mini history */
.mini-hist{margin-top:18px;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px rgba(176,96,64,.07);}
.mini-hist h4{font-size:12px;font-weight:700;color:var(--br);margin-bottom:10px;}
.mini-hist table{width:100%;border-collapse:collapse;font-size:11.5px;}
.mini-hist th{padding:4px 2px;text-align:center;font-weight:600;color:var(--gy);}
.mini-hist th.a{color:var(--ta);}.mini-hist th.b{color:var(--tb);}
.mini-hist td{text-align:center;padding:5px 2px;border-top:1px solid var(--pk);}
.mini-hist tr.hidden-row td{background:var(--gdl);}

/* RESULT */
.result-wrap{width:100%;max-width:480px;}
.result-hdr{text-align:center;margin-bottom:18px;}
.result-rlbl{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--br3);margin-bottom:4px;}
.result-title{font-size:24px;font-weight:900;color:var(--br);}
.reveal-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
.reveal-card{flex:1;background:#fff;border-radius:16px;padding:14px 11px;text-align:center;}
.reveal-card.a{border:2px solid var(--ta3);box-shadow:0 4px 14px rgba(239,83,80,.1);}
.reveal-card.b{border:2px solid var(--tb3);box-shadow:0 4px 14px rgba(33,150,243,.1);}
.rev-team{font-size:11px;font-weight:700;margin-bottom:7px;}
.reveal-card.a .rev-team{color:var(--ta);}.reveal-card.b .rev-team{color:var(--tb);}
.rev-cross{font-size:11px;color:var(--gy);text-decoration:line-through;margin-bottom:1px;}
.rev-emoji{font-size:40px;margin-bottom:4px;line-height:1;}
.rev-name{font-size:12px;font-weight:700;color:var(--br);margin-bottom:7px;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:9px;}
.tag{font-size:9px;font-weight:700;color:#fff;border-radius:6px;padding:2px 6px;}
.tag.dbl{background:var(--dbc);}.tag.sw{background:var(--swc);}
.rev-score{font-size:24px;font-weight:900;}
.vs-sep{font-size:13px;color:var(--br3);font-weight:700;flex-shrink:0;}
.outcome-box{border-radius:12px;padding:11px 16px;text-align:center;margin-bottom:10px;}
.outcome-box p{font-size:14px;font-weight:700;}
.priority-explain{background:#fff;border-radius:10px;padding:8px 14px;margin-bottom:14px;
  font-size:11px;color:var(--br3);text-align:center;border:1px solid var(--pk);line-height:1.6;}
.totals-box{background:#fff;border-radius:14px;padding:16px 20px;
  display:flex;justify-content:space-around;align-items:center;
  box-shadow:0 2px 10px rgba(176,96,64,.07);margin-bottom:18px;}
.tot-blk{text-align:center;}
.tot-lbl{font-size:10px;font-weight:600;color:var(--gy);margin-bottom:2px;}
.tot-num{font-size:32px;font-weight:900;line-height:1;}
.tot-num.a{color:var(--ta);}.tot-num.b{color:var(--tb);}
.tot-sep{width:1px;height:40px;background:var(--pk);}

/* HIDDEN REVEAL SCREEN */
.hidden-wrap{width:100%;max-width:460px;text-align:center;}
.hidden-icon{font-size:72px;margin-bottom:16px;line-height:1;}
.hidden-title{font-size:30px;font-weight:900;color:var(--gd);margin-bottom:8px;letter-spacing:-1px;}
.hidden-desc{font-size:14px;color:var(--br2);line-height:1.9;margin-bottom:24px;}
.hidden-score-box{background:#fff;border-radius:18px;padding:22px;margin-bottom:22px;
  box-shadow:0 4px 20px rgba(217,119,6,.12);border:2px solid #FCD34D;}
.hidden-score-box h4{font-size:13px;font-weight:700;color:var(--br);margin-bottom:16px;}
.hid-scores{display:flex;justify-content:space-around;align-items:center;}
.hid-team{text-align:center;}
.hid-team-lbl{font-size:11px;font-weight:700;margin-bottom:4px;}
.hid-team-lbl.a{color:var(--ta);}.hid-team-lbl.b{color:var(--tb);}
.hid-big{font-size:44px;font-weight:900;line-height:1;}
.hid-big.a{color:var(--ta);}.hid-big.b{color:var(--tb);}
.hid-colon{font-size:20px;color:var(--ap);font-weight:700;}
.item-reset-box{background:var(--gdl);border-radius:14px;padding:14px 18px;margin-bottom:22px;
  border:1.5px solid #FCD34D;}
.item-reset-box p{font-size:13px;color:var(--gd);font-weight:700;margin-bottom:8px;}
.item-reset-box ul{font-size:12px;color:var(--br2);line-height:2;list-style:none;padding:0;}

/* FINAL */
.final-wrap{width:100%;max-width:480px;padding-top:8px;}
.winner-card{background:#fff;border-radius:22px;padding:26px 22px;text-align:center;
  box-shadow:0 6px 28px rgba(176,96,64,.11);border:1.5px solid var(--ap);margin-bottom:16px;}
.trophy{font-size:58px;margin-bottom:12px;line-height:1;}
.winner-txt{font-size:26px;font-weight:900;margin-bottom:6px;}
.winner-sub{font-size:13px;color:var(--br3);}
.score-compare{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:22px;}
.sc-team{text-align:center;}
.sc-team-lbl{font-size:11px;font-weight:700;margin-bottom:4px;}
.sc-team-lbl.a{color:var(--ta);}.sc-team-lbl.b{color:var(--tb);}
.sc-big{font-size:46px;font-weight:900;line-height:1;}
.sc-big.a{color:var(--ta);}.sc-big.b{color:var(--tb);}
.sc-love{font-size:11px;color:var(--gy);margin-top:4px;}
.sc-colon{font-size:20px;color:var(--ap);font-weight:700;}
.hist-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(176,96,64,.07);margin-bottom:14px;}
.hist-card h4{font-size:13px;font-weight:700;color:var(--br);margin-bottom:12px;}
.hist-card table{width:100%;border-collapse:collapse;font-size:12px;}
.hist-card th{padding:7px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--gy);background:var(--cr);}
.hist-card th.a{color:var(--ta);}.hist-card th.b{color:var(--tb);}
.hist-card td{text-align:center;padding:7px 4px;border-top:1px solid var(--pk);}
.hist-total{border-top:2px solid var(--ap)!important;background:var(--cr);}
.hist-hidden{background:var(--gdl)!important;}
.hist-hidden td:first-child::after{content:' ⚡';font-size:10px;}
.reflect{background:linear-gradient(135deg,var(--lo2),var(--pk));border-radius:14px;padding:16px 20px;
  text-align:center;border:1.5px solid var(--ap);margin-bottom:20px;}
.reflect p{font-size:13px;color:var(--br);line-height:1.85;}

.gn{color:var(--gn);font-weight:700;}.rd{color:var(--rd);font-weight:700;}.gy-w{color:var(--gy);font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const TR = 5;       /* 일반 라운드 수 */
const MAX = 6;      /* 히든 포함 최대 라운드 */

/* 점수표 - 선택한 카드 기준 */
const SM = {
  'love,love':      [ 3,  3],
  'love,benefit':   [ 0,  5],
  'benefit,love':   [ 5,  0],
  'benefit,benefit':[-2, -2],
};

function mkSel()   { return {aCard:null,bCard:null,aDouble:false,bDouble:false,aSwitch:false,bSwitch:false}; }
function mkItems() { return {A:{double:2,switch:1},B:{double:2,switch:1}}; }

let S = resetState('main');
function resetState(screen) {
  return { screen, round:1, scores:{A:0,B:0}, history:[], items:mkItems(), sel:mkSel(), result:null };
}

/* ── 액션 ── */
window.startGame = () => { S = resetState('playing'); render(); };

window.selectCard = (team, card) => {
  const k = team==='A' ? 'aCard' : 'bCard';
  S.sel[k] = S.sel[k] === card ? null : card;
  render();
};

window.toggleItem = (team, type) => {
  const k = team==='A' ? (type==='double'?'aDouble':'aSwitch') : (type==='double'?'bDouble':'bSwitch');
  if (!S.sel[k] && S.items[team][type] === 0) return;
  S.sel[k] = !S.sel[k];
  render();
};

window.confirmRound = () => {
  const {aCard,bCard,aDouble,bDouble,aSwitch,bSwitch} = S.sel;

  /* 1순위: ×2 계산 (선택한 카드 기준 기본 점수에 배수 적용) */
  const [ab, bb] = SM[aCard+','+bCard];
  let aScore = aDouble ? ab*2 : ab;
  let bScore = bDouble ? bb*2 : bb;

  /* 2순위: 스위치 → 점수 교환 (양팀 동시 사용 시 상쇄) */
  let scoreSwapped = false;
  if ((aSwitch || bSwitch) && !(aSwitch && bSwitch)) {
    [aScore, bScore] = [bScore, aScore];
    scoreSwapped = true;
  }

  S.scores.A += aScore;
  S.scores.B += bScore;
  S.result = {
    round: S.round, isHidden: S.round > TR,
    aCard, bCard, aDouble, bDouble, aSwitch, bSwitch,
    aBaseScore: aDouble?ab*2:ab, bBaseScore: bDouble?bb*2:bb,
    scoreSwapped, aScore, bScore,
  };
  S.history.push({...S.result, totalA:S.scores.A, totalB:S.scores.B});
  S.items.A.double -= aDouble?1:0; S.items.A.switch -= aSwitch?1:0;
  S.items.B.double -= bDouble?1:0; S.items.B.switch -= bSwitch?1:0;
  S.screen = 'roundResult';
  render();
};

window.nextRound = () => {
  if (S.round >= MAX)      { S.screen = 'final'; }
  else if (S.round === TR) { S.screen = 'hidden'; }
  else {
    S.round++;
    S.sel = mkSel();
    S.screen = 'playing';
  }
  render();
};

window.startHiddenRound = () => {
  S.round = TR + 1;
  S.items = mkItems(); /* 아이템 초기화 */
  S.sel   = mkSel();
  S.screen = 'playing';
  render();
};

window.restartGame = () => { S = resetState('main'); render(); };

/* ── 헬퍼 ── */
const scoreClass = n => n>0?'gn':n<0?'rd':'gy-w';
const scoreSign  = n => (n>0?'+':'')+n;
const cardEmoji  = c => c==='love'?'❤️':'💰';
const cardName   = c => c==='love'?'사랑 카드':'편익 카드';
const isHiddenRound = () => S.round > TR;

function dots() {
  if (isHiddenRound()) {
    return Array.from({length:TR}, ()=>'<div class="prog-dot done"></div>').join('')
      + '<div class="prog-dot hid flash"></div>';
  }
  return Array.from({length:TR}, (_,i) => {
    const cls = i+1<S.round?'done':i+1===S.round?'cur':'pend';
    return `<div class="prog-dot ${cls}"></div>`;
  }).join('');
}

function teamPanel(team) {
  const tk  = team==='A'?'a':'b';
  const card = S.sel[tk+'Card'];
  const dbl  = S.sel[tk+'Double'];
  const sw   = S.sel[tk+'Switch'];
  const it   = S.items[team];
  const lcls = 'card-btn love btn'+(card==='love'?' selected':'');
  const bcls = 'card-btn benefit btn'+(card==='benefit'?' selected':'');
  const dcls = 'item-btn double btn'+(dbl?' on':'');
  const scls = 'item-btn switch btn'+(sw?' on':'');
  const ddis = !dbl&&it.double===0?'disabled':'';
  const sdis = !sw&&it.switch===0?'disabled':'';
  return `
  <div class="team-panel ${team.toLowerCase()}">
    <div class="team-name">${team==='A'?'🔴 A팀':'🔵 B팀'}</div>
    <div class="sec-lbl">카드 선택</div>
    <div class="card-row">
      <button class="${lcls}" onclick="selectCard('${team}','love')">
        <div class="c-emoji">❤️</div><div class="c-lbl">사랑 카드</div>
      </button>
      <button class="${bcls}" onclick="selectCard('${team}','benefit')">
        <div class="c-emoji">💰</div><div class="c-lbl">편익 카드</div>
      </button>
    </div>
    <div class="sec-lbl">아이템 카드</div>
    <div class="item-row">
      <button class="${dcls}" onclick="toggleItem('${team}','double')" ${ddis}>
        <div class="i-icon">✕2</div><div class="i-lbl">×2 카드</div>
        ${it.double>0?`<span class="badge">${it.double}</span>`:''}
      </button>
      <button class="${scls}" onclick="toggleItem('${team}','switch')" ${sdis}>
        <div class="i-icon">🔀</div><div class="i-lbl">스위치</div>
        ${it.switch>0?`<span class="badge">${it.switch}</span>`:''}
      </button>
    </div>
  </div>`;
}

function miniHistory() {
  if (!S.history.length) return '';
  const rows = S.history.map(h => `
    <tr class="${h.isHidden?'hidden-row':''}">
      <td style="font-weight:700;color:${h.isHidden?'var(--gd)':'var(--br2)'}">${h.isHidden?'⚡':h.round}</td>
      <td>${cardEmoji(h.aCard)}${h.aDouble?'<sup style="font-size:9px;color:var(--dbc)">×2</sup>':''}${h.aSwitch?'<sup style="font-size:9px;color:var(--swc)">🔀</sup>':''}</td>
      <td>${cardEmoji(h.bCard)}${h.bDouble?'<sup style="font-size:9px;color:var(--dbc)">×2</sup>':''}${h.bSwitch?'<sup style="font-size:9px;color:var(--swc)">🔀</sup>':''}</td>
      <td class="${scoreClass(h.aScore)}">${scoreSign(h.aScore)}</td>
      <td class="${scoreClass(h.bScore)}">${scoreSign(h.bScore)}</td>
    </tr>`).join('');
  return `
  <div class="mini-hist">
    <h4>📊 점수 기록</h4>
    <table><thead><tr>
      <th>R</th><th>A팀</th><th>B팀</th><th class="a">A점</th><th class="b">B점</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

/* ── 화면 HTML ── */
function htmlMain() {
  return `
  <div class="page center">
  <div class="main-wrap fade-up">
    <div class="logo float-y">🕊️</div>
    <h1 class="main-title">정직한 게임</h1>
    <p class="main-sub">죄수의 딜레마를 넘어<br><strong>사랑의 힘</strong>으로 함께 이기는 게임</p>
    <div class="rules-card">
      <h3>📋 라운드 점수 규칙</h3>
      <div class="rule-row"><span>A: ❤️ 사랑 · B: ❤️ 사랑</span><span class="sc-g">+3 / +3</span></div>
      <div class="rule-row"><span>A: ❤️ 사랑 · B: 💰 편익</span><span class="sc-y">0 / +5</span></div>
      <div class="rule-row"><span>A: 💰 편익 · B: ❤️ 사랑</span><span class="sc-y">+5 / 0</span></div>
      <div class="rule-row last"><span>A: 💰 편익 · B: 💰 편익</span><span class="sc-r">-2 / -2</span></div>
      <div class="item-note">✕2 카드 (팀당 2장, 점수 2배) · 🔀 스위치 (팀당 1장, 점수 교환)<br>
        <strong>우선순위:</strong> ×2 먼저 계산 → 스위치로 점수 교환</div>
    </div>
    <button class="btn-primary" onclick="startGame()">🎮 게임 시작하기</button>
    <p class="footer-note">A팀 vs B팀</p>
  </div>
  </div>`;
}

function htmlPlaying() {
  const hidden = isHiddenRound();
  const canConfirm = !!(S.sel.aCard && S.sel.bCard);
  const roundTot = hidden ? '<span style="color:var(--gd)">히든</span>' : `/ ${TR}`;
  return `
  <div class="page">
  <div class="game-wrap">
    ${hidden ? '<div class="hidden-banner">⚡ 히든 라운드 — 아이템이 초기화되었습니다!</div>' : ''}
    <div class="score-header">
      <div class="score-box a">
        <div class="score-lbl">🔴 A팀</div>
        <div class="score-num a">${S.scores.A}</div>
      </div>
      <div class="round-mid">
        <div class="round-lbl">ROUND</div>
        <div class="round-num ${hidden?'gold':''}">${hidden?'⚡':S.round}</div>
        <div class="round-tot">${roundTot}</div>
      </div>
      <div class="score-box b">
        <div class="score-lbl">🔵 B팀</div>
        <div class="score-num b">${S.scores.B}</div>
      </div>
    </div>
    <div class="progress">${dots()}</div>
    <div class="teams-row">
      ${teamPanel('A')}
      ${teamPanel('B')}
    </div>
    <div class="priority-note">📌 아이템 우선순위: ✕2 점수 계산 → 🔀 스위치로 점수 교환</div>
    <br>
    <button class="btn-primary ${hidden?'btn-gold':''}" onclick="confirmRound()" ${canConfirm?'':'disabled'}>
      ${canConfirm?'✅ 라운드 확정하기':'양팀 모두 카드를 선택해주세요'}
    </button>
    ${miniHistory()}
  </div>
  </div>`;
}

function htmlResult() {
  const r = S.result;
  const isLast = r.round >= MAX;
  const isNormalLast = r.round === TR;

  const outcome = (() => {
    if (r.aCard==='love'&&r.bCard==='love') return {txt:'🌟 두 팀 모두 사랑을 선택했어요!',bg:'var(--gnl)',c:'var(--gn)'};
    if (r.aCard==='benefit'&&r.bCard==='benefit') return {txt:'😢 두 팀 모두 편익을 선택했어요...',bg:'#FFF5F5',c:'var(--rd)'};
    if (r.aCard==='love') return {txt:'🌊 B팀이 편익을 선택했어요',bg:'var(--dbl)',c:'var(--dbc)'};
    return {txt:'🌊 A팀이 편익을 선택했어요',bg:'var(--dbl)',c:'var(--dbc)'};
  })();

  /* 결과 카드: 고른 카드 표시, 점수는 우선순위 반영 */
  const revCard = (side, card, dbl, sw, baseScore, finalScore, swapped) => {
    const tags = [
      dbl ? '<span class="tag dbl">✕2 사용</span>' : '',
      sw  ? '<span class="tag sw">🔀 스위치</span>' : '',
    ].join('');
    return `
    <div class="reveal-card ${side} scale-in">
      <div class="rev-team">${side==='a'?'🔴 A팀':'🔵 B팀'}</div>
      <div class="rev-emoji">${cardEmoji(card)}</div>
      <div class="rev-name">${cardName(card)}</div>
      <div class="tag-row">${tags}</div>
      ${swapped ? `<div class="rev-cross">${scoreSign(baseScore)}점 → 교환</div>` : ''}
      <div class="rev-score ${scoreClass(finalScore)}">${scoreSign(finalScore)}점</div>
    </div>`;
  };

  const showPriority = (r.aDouble||r.bDouble) && (r.aSwitch||r.bSwitch) && !r.scoreSwapped===false;
  const priorityExplain = (r.aDouble||r.bDouble) && r.scoreSwapped
    ? `<div class="priority-explain">✕2 적용 후 점수 교환 — ${r.aDouble?'A팀 점수 2배':''}${r.aDouble&&r.bDouble?' · ':''}${r.bDouble?'B팀 점수 2배':''}, 이후 🔀 스위치로 점수 교환</div>`
    : '';

  const btnTxt = isLast ? '🏆 최종 결과 보기'
    : isNormalLast ? '🏁 게임 종료'
    : `➡️ ${r.round+1}라운드 시작`;

  return `
  <div class="page center">
  <div class="result-wrap">
    <div class="result-hdr fade-up">
      <div class="result-rlbl">${r.isHidden?'⚡ 히든 ':('ROUND '+r.round+' ')}결과</div>
      <div class="result-title">카드 공개!</div>
    </div>
    <div class="reveal-row">
      ${revCard('a',r.aCard,r.aDouble,r.aSwitch,r.aBaseScore,r.aScore,r.scoreSwapped)}
      <div class="vs-sep">VS</div>
      ${revCard('b',r.bCard,r.bDouble,r.bSwitch,r.bBaseScore,r.bScore,r.scoreSwapped)}
    </div>
    <div class="outcome-box fade-up" style="background:${outcome.bg}">
      <p style="color:${outcome.c}">${outcome.txt}</p>
    </div>
    ${priorityExplain}
    <div class="totals-box fade-up">
      <div class="tot-blk"><div class="tot-lbl">🔴 A팀 누계</div><div class="tot-num a">${S.scores.A}</div></div>
      <div class="tot-sep"></div>
      <div class="tot-blk"><div class="tot-lbl">🔵 B팀 누계</div><div class="tot-num b">${S.scores.B}</div></div>
    </div>
    <button class="btn-primary ${isNormalLast?'btn-gold':''}" onclick="nextRound()">${btnTxt}</button>
  </div>
  </div>`;
}

function htmlHidden() {
  return `
  <div class="page center bg-flash" style="min-height:100vh;">
  <div class="hidden-wrap">
    <div class="pop-reveal" style="text-align:center;margin-bottom:28px;">
      <div style="font-size:80px;line-height:1;margin-bottom:16px;filter:drop-shadow(0 0 24px #F59E0B);">⚡</div>
      <div style="font-size:36px;font-weight:900;color:#fff;letter-spacing:-1.5px;
        text-shadow:0 2px 20px rgba(0,0,0,.4);margin-bottom:8px;">히든 라운드 공개!</div>
      <div style="font-size:15px;color:rgba(255,255,255,.85);font-weight:500;line-height:1.8;">
        마지막 라운드가 열렸습니다!<br>아이템이 <strong style="color:#FDE68A">모두 초기화</strong>됩니다.
      </div>
    </div>

    <div class="pop-reveal" style="animation-delay:.15s;background:rgba(255,255,255,.95);
      border-radius:20px;padding:20px 22px;margin-bottom:16px;
      border:2px solid #FCD34D;box-shadow:0 8px 32px rgba(217,119,6,.3);">
      <div style="font-size:12px;font-weight:700;color:var(--br);margin-bottom:14px;text-align:center;">📊 현재 점수</div>
      <div class="hid-scores">
        <div class="hid-team">
          <div class="hid-team-lbl a">🔴 A팀</div>
          <div class="hid-big a">${S.scores.A}</div>
        </div>
        <div class="hid-colon">:</div>
        <div class="hid-team">
          <div class="hid-team-lbl b">🔵 B팀</div>
          <div class="hid-big b">${S.scores.B}</div>
        </div>
      </div>
    </div>

    <div class="pop-reveal" style="animation-delay:.28s;background:rgba(255,251,235,.95);
      border-radius:14px;padding:14px 18px;margin-bottom:24px;border:1.5px solid #FCD34D;">
      <p style="font-size:13px;font-weight:700;color:var(--gd);margin-bottom:8px;">🎁 아이템 초기화</p>
      <ul style="font-size:12px;color:var(--br2);line-height:2.1;list-style:none;padding:0;">
        <li>✕2 카드 — 팀당 2장</li>
        <li>🔀 스위치 카드 — 팀당 1장</li>
      </ul>
    </div>

    <div class="pop-reveal" style="animation-delay:.4s;">
      <button class="btn-primary btn-gold" onclick="startHiddenRound()"
        style="font-size:18px;padding:18px;letter-spacing:-.5px;">
        ⚡ 히든 라운드 시작!
      </button>
    </div>
  </div>
  </div>`;
}

function htmlFinal() {
  const {A,B} = S.scores;
  const diff = A-B;
  const tie  = diff===0;
  const aWin = diff>0;
  const winColor = tie?'var(--br2)':aWin?'var(--ta)':'var(--tb)';
  const aLove = S.history.filter(h=>h.aCard==='love').length;
  const bLove = S.history.filter(h=>h.bCard==='love').length;
  const totalLove = aLove+bLove;

  const reflect = totalLove >= 9
    ? '두 팀이 서로 사랑을 많이 선택했어요! 신뢰가 쌓이면 모두가 함께 이길 수 있어요. 💛'
    : totalLove >= 5
    ? '사랑과 편익 사이에서 고민했군요. 신뢰가 쌓일수록 사랑의 힘이 빛납니다! 🌱'
    : '이번엔 편익을 많이 선택했네요. 다음번엔 사랑으로 함께 이겨봐요! 😊';

  const histRows = S.history.map(h => `
    <tr class="${h.isHidden?'hist-hidden':''}">
      <td style="font-weight:700;color:${h.isHidden?'var(--gd)':'var(--br2)'}">${h.isHidden?'⚡':h.round}</td>
      <td>${cardEmoji(h.aCard)}${h.aDouble?'<sup style="font-size:9px;color:var(--dbc)">×2</sup>':''}${h.aSwitch?'<sup style="font-size:9px">🔀</sup>':''}</td>
      <td>${cardEmoji(h.bCard)}${h.bDouble?'<sup style="font-size:9px;color:var(--dbc)">×2</sup>':''}${h.bSwitch?'<sup style="font-size:9px">🔀</sup>':''}</td>
      <td class="${scoreClass(h.aScore)}">${scoreSign(h.aScore)}</td>
      <td class="${scoreClass(h.bScore)}">${scoreSign(h.bScore)}</td>
    </tr>`).join('');

  return `
  <div class="page center">
  <div class="final-wrap fade-up">
    <div class="winner-card">
      <div class="trophy float-y">${tie?'🤝':'🏆'}</div>
      <div class="winner-txt" style="color:${winColor}">${tie?'무승부!':aWin?'A팀 우승!':'B팀 우승!'}</div>
      ${!tie?`<div class="winner-sub">${Math.abs(diff)}점 차로 ${aWin?'A팀':'B팀'}이 승리했어요!</div>`:'<div class="winner-sub">양팀 동점이에요!</div>'}
      <div class="score-compare">
        <div class="sc-team">
          <div class="sc-team-lbl a">🔴 A팀</div>
          <div class="sc-big a">${A}</div>
          <div class="sc-love">❤️ ${aLove}번</div>
        </div>
        <div class="sc-colon">:</div>
        <div class="sc-team">
          <div class="sc-team-lbl b">🔵 B팀</div>
          <div class="sc-big b">${B}</div>
          <div class="sc-love">❤️ ${bLove}번</div>
        </div>
      </div>
    </div>
    <div class="hist-card">
      <h4>📊 전체 라운드 기록</h4>
      <table>
        <thead><tr>
          <th>R</th><th>A팀</th><th>B팀</th>
          <th class="a">A점수</th><th class="b">B점수</th>
        </tr></thead>
        <tbody>
          ${histRows}
          <tr>
            <td class="hist-total" style="font-weight:900;color:var(--br)">합계</td>
            <td class="hist-total"></td><td class="hist-total"></td>
            <td class="hist-total" style="font-weight:900;color:var(--ta);font-size:14px">${A}</td>
            <td class="hist-total" style="font-weight:900;color:var(--tb);font-size:14px">${B}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="reflect"><p>${reflect}</p></div>
    <button class="btn-primary" onclick="restartGame()" style="margin-bottom:32px">🔄 다시 시작하기</button>
  </div>
  </div>`;
}

/* ── 컨페티 ── */
function spawnConfetti() {
  const colors=['#FF8C6B','#FFB38A','#FFD580','#F48FB1','#90CAF9','#A5D6A7','#CE93D8'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='conf-piece';
    const dur=2.2+Math.random()*1.5;
    el.style.cssText=`left:${Math.random()*100}%;width:${6+Math.random()*8}px;height:${10+Math.random()*6}px;background:${colors[i%colors.length]};animation-duration:${dur}s;animation-delay:${Math.random()*1.4}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove&&el.remove(),(dur+1.5)*1000);
  }
}

/* ── 렌더 ── */
function render() {
  const map = {main:htmlMain, playing:htmlPlaying, roundResult:htmlResult, hidden:htmlHidden, final:htmlFinal};
  document.getElementById('root').innerHTML = map[S.screen]();
  if(S.screen==='final') setTimeout(spawnConfetti,100);
}

render();
</script>
</body>
</html>
